<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Morning Brief — Akshdeep</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0D0D0D; --surface:#141414; --surface2:#1A1A1A;
    --border:#2A2A2A; --border2:#333; --text:#F0EDE8;
    --text2:#888; --text3:#555; --accent:#C8F135; --accent2:#A8D120;
    --red:#FF4D4D; --amber:#FFB547; --teal:#2DD4BF; --blue:#60A5FA; --purple:#A78BFA;
    --radius:12px; --font:'Syne',sans-serif; --mono:'DM Mono',monospace; --body:'DM Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh;}
  .app{max-width:960px;margin:0 auto;padding:32px 20px;}
  .header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid var(--border);}
  .logo{font-family:var(--font);font-size:28px;font-weight:800;letter-spacing:-1px;color:var(--text);display:flex;align-items:center;gap:10px;}
  .logo-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);display:inline-block;animation:blink 2s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  .header-meta{font-size:12px;color:var(--text3);margin-top:6px;font-family:var(--mono);}
  .header-right{display:flex;gap:8px;align-items:center;}
  .btn{font-family:var(--font);font-size:13px;font-weight:600;padding:10px 18px;border-radius:8px;cursor:pointer;border:none;transition:all 0.15s;letter-spacing:0.01em;}
  .btn-primary{background:var(--accent);color:#0D0D0D;}
  .btn-primary:hover{background:var(--accent2);transform:translateY(-1px);}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
  .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
  .btn-ghost:hover{border-color:var(--text2);color:var(--text);}
  .btn-ghost.active{background:var(--surface2);color:var(--text);border-color:var(--text2);}
  .btn-danger{background:transparent;color:var(--red);border:1px solid #FF4D4D44;font-size:12px;padding:7px 14px;}
  .btn-danger:hover{background:#FF4D4D11;}
  .nav{display:flex;gap:6px;margin-bottom:28px;}
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
  .metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden;}
  .metric::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
  .metric.green::before{background:var(--accent);}
  .metric.red::before{background:var(--red);}
  .metric.amber::before{background:var(--amber);}
  .metric.blue::before{background:var(--blue);}
  .metric-label{font-size:11px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
  .metric-val{font-family:var(--font);font-size:32px;font-weight:800;letter-spacing:-1px;}
  .metric-sub{font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--mono);}
  .alert{background:#2A1F00;border:1px solid #FFB54744;border-radius:var(--radius);padding:14px 18px;margin-bottom:16px;}
  .alert-title{font-size:12px;font-weight:600;color:var(--amber);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;}
  .alert-item{font-size:13px;color:#FFD88A;padding:4px 0;display:flex;gap:8px;line-height:1.5;}
  .alert-item::before{content:'→';flex-shrink:0;color:var(--amber);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
  .card-title{font-family:var(--font);font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .card-title-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .sb{margin-bottom:16px;}
  .sb:last-child{margin-bottom:0;}
  .sb-label{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.1em;color:var(--text3);margin-bottom:5px;}
  .sb-text{font-size:13px;color:var(--text);line-height:1.7;}
  .ai{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
  .ai:last-child{border-bottom:none;}
  .pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
  .plabel{font-size:10px;font-family:var(--mono);font-weight:500;text-transform:uppercase;letter-spacing:0.06em;margin-right:4px;}
  .atext{font-size:13px;color:var(--text);line-height:1.5;flex:1;}
  .badge{font-size:10px;font-family:var(--mono);font-weight:500;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;}
  .badge-applied{background:#1A2A3A;color:var(--blue);}
  .badge-reviewing{background:#221A3A;color:var(--purple);}
  .badge-interview{background:#0A2A22;color:var(--teal);}
  .badge-offer{background:#1A2A0A;color:var(--accent);}
  .badge-rejected{background:#2A0A0A;color:var(--red);}
  .badge-closed{background:#1A1A1A;color:var(--text3);}
  .badge-opportunity{background:#2A1A00;color:var(--amber);}
  .tbl{width:100%;border-collapse:collapse;}
  .tbl th{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);padding:0 12px 10px;text-align:left;border-bottom:1px solid var(--border);}
  .tbl td{padding:11px 12px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
  .tbl tr:last-child td{border-bottom:none;}
  .tbl tr:hover td{background:var(--surface2);}
  .pc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;gap:12px;align-items:flex-start;transition:border-color 0.15s;}
  .pc:hover{border-color:var(--border2);}
  .run-view{max-width:440px;margin:60px auto;}
  .run-title{font-family:var(--font);font-size:22px;font-weight:800;margin-bottom:6px;letter-spacing:-0.5px;}
  .run-sub{font-size:13px;color:var(--text3);margin-bottom:28px;font-family:var(--mono);}
  .step-list{display:flex;flex-direction:column;gap:10px;}
  .step-item{display:flex;align-items:center;gap:12px;}
  .step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--mono);flex-shrink:0;transition:all 0.3s;}
  .step-num.done{background:var(--accent);color:#0D0D0D;}
  .step-num.active{background:var(--purple);color:#fff;animation:pr 1.5s infinite;}
  .step-num.pending{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
  @keyframes pr{0%,100%{box-shadow:0 0 0 0 #A78BFA44}50%{box-shadow:0 0 0 6px #A78BFA00}}
  .step-text{font-size:13px;transition:color 0.3s;}
  .step-text.done{color:var(--accent);}
  .step-text.active{color:var(--purple);font-weight:500;}
  .step-text.pending{color:var(--text3);}
  .ebox{background:#1A0000;border:1px solid #FF4D4D44;border-radius:var(--radius);padding:14px 18px;margin-top:20px;}
  .etitle{font-size:12px;font-weight:600;color:var(--red);font-family:var(--mono);text-transform:uppercase;margin-bottom:6px;}
  .etext{font-size:12px;color:#FF9999;line-height:1.6;white-space:pre-wrap;word-break:break-word;margin-bottom:10px;}
  .edebug{background:#0D0D0D;border-radius:6px;padding:8px 10px;font-family:var(--mono);font-size:10px;color:var(--text3);word-break:break-word;margin-bottom:10px;max-height:120px;overflow-y:auto;}
  .empty{text-align:center;padding:80px 20px;}
  .empty-icon{font-size:48px;margin-bottom:16px;}
  .empty-title{font-family:var(--font);font-size:20px;font-weight:800;margin-bottom:8px;letter-spacing:-0.5px;}
  .empty-sub{font-size:13px;color:var(--text3);margin-bottom:28px;line-height:1.6;max-width:320px;margin-left:auto;margin-right:auto;}

  /* ── Setup screen ── */
  .setup{max-width:480px;margin:60px auto;}
  .setup-title{font-family:var(--font);font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px;}
  .setup-sub{font-size:13px;color:var(--text3);margin-bottom:32px;line-height:1.7;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:6px;}
  .field input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:11px 14px;font-size:13px;font-family:var(--mono);color:var(--text);outline:none;transition:border-color 0.15s;}
  .field input:focus{border-color:var(--accent);}
  .field input::placeholder{color:var(--text3);}
  .field-hint{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.5;}
  .setup-note{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:24px;font-size:12px;color:var(--text2);line-height:1.7;font-family:var(--mono);}
  .setup-note a{color:var(--accent);text-decoration:none;}

  /* ── Auth screen ── */
  .auth-screen{max-width:400px;margin:80px auto;text-align:center;}
  .auth-title{font-family:var(--font);font-size:32px;font-weight:800;letter-spacing:-1px;margin-bottom:8px;}
  .auth-sub{font-size:14px;color:var(--text3);margin-bottom:32px;line-height:1.6;}
  .auth-btn{display:inline-flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:14px 24px;font-family:var(--font);font-size:14px;font-weight:600;color:var(--text);cursor:pointer;transition:all 0.15s;}
  .auth-btn:hover{border-color:var(--text2);transform:translateY(-1px);}
  .auth-note{font-size:11px;color:var(--text3);margin-top:16px;font-family:var(--mono);line-height:1.6;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid #0D0D0D44;border-top-color:#0D0D0D;border-radius:50%;animation:spin 0.7s linear infinite;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ── Keys stored only in browser localStorage — never in code ──
const KEYS = {
  gemini:   () => localStorage.getItem("mb_gemini_key"),
  clientId: () => localStorage.getItem("mb_client_id"),
  sheets:   () => localStorage.getItem("mb_sheets_id"),
  token:    () => { try { const d=JSON.parse(localStorage.getItem("mb_token")); if(!d) return null; if(Date.now()-d.ts>55*60*1000){localStorage.removeItem("mb_token");return null;} return d.v; } catch{return null;} },
};
const saveToken = t => localStorage.setItem("mb_token", JSON.stringify({v:t,ts:Date.now()}));
const clearToken = () => localStorage.removeItem("mb_token");

const PIPELINE_KEY="mb_pipeline", RUNS_KEY="mb_runs";
const savePipeline = d => localStorage.setItem(PIPELINE_KEY, JSON.stringify(d));
const loadPipeline = () => { try{return JSON.parse(localStorage.getItem(PIPELINE_KEY))||[];}catch{return[];} };
const saveRuns = d => localStorage.setItem(RUNS_KEY, JSON.stringify(d));
const loadRuns = () => { try{return JSON.parse(localStorage.getItem(RUNS_KEY))||[];}catch{return[];} };

// ── State ──
let S = {
  view: "setup", // setup | auth | dashboard | pipeline | run
  running: false, step: -1, error: null, debugInfo: null,
  standup: null, actionItems: [], alerts: [],
  pipeline: loadPipeline(), runs: loadRuns(), lastRun: null,
};

function init() {
  // Check setup complete
  if (!KEYS.gemini() || !KEYS.clientId() || !KEYS.sheets()) { S.view="setup"; render(); return; }
  // Handle OAuth callback
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token = params.get("access_token");
  if (token) { saveToken(token); window.history.replaceState(null,"",window.location.pathname); }
  // Check token
  if (!KEYS.token()) { S.view="auth"; render(); return; }
  // Restore last run
  if (S.runs.length > 0) {
    const last = S.runs[S.runs.length-1];
    S.standup=last.standup; S.actionItems=last.actionItems||[]; S.alerts=last.alerts||[]; S.lastRun=last.date;
  }
  S.view="dashboard"; render();
}

// ── Render ──
function render() {
  const app = document.getElementById("app");
  if (S.view==="setup") { app.innerHTML=renderSetup(); return; }
  if (S.view==="auth")  { app.innerHTML=renderAuth();  return; }
  app.innerHTML = renderHeader() + (S.view==="run" ? renderRun() : `
    <div class="nav">
      <button class="btn btn-ghost ${S.view==='dashboard'?'active':''}" onclick="setView('dashboard')">Today</button>
      <button class="btn btn-ghost ${S.view==='pipeline'?'active':''}" onclick="setView('pipeline')">Pipeline (${S.pipeline.length})</button>
      <button class="btn btn-ghost" onclick="showSettings()" style="margin-left:auto;font-size:11px">⚙ Keys</button>
    </div>
    ${S.view==="dashboard" ? renderDashboard() : renderPipeline()}
  `);
}

function renderSetup() {
  return `
  <div class="setup">
    <div class="logo" style="margin-bottom:24px"><span class="logo-dot"></span>morning brief</div>
    <div class="setup-title">First time setup</div>
    <div class="setup-sub">Enter your API keys below. They are saved only in your browser — never sent anywhere else, never stored in the code.</div>
    <div class="setup-note">
      <b style="color:var(--text)">Where to get each key:</b><br/>
      Gemini key → <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a> → Get API key<br/>
      Google Client ID → Google Cloud Console → Morning Brief project → Clients<br/>
      Sheets ID → The long ID in your Google Sheets URL between /d/ and /edit
    </div>
    <div class="field">
      <label>Gemini API Key</label>
      <input id="f-gemini" type="password" placeholder="AIza..." value="${KEYS.gemini()||''}"/>
      <div class="field-hint">From Google AI Studio — free, no credit card needed</div>
    </div>
    <div class="field">
      <label>Google OAuth Client ID</label>
      <input id="f-clientid" type="text" placeholder="123456789-abc...apps.googleusercontent.com" value="${KEYS.clientId()||''}"/>
      <div class="field-hint">From Google Cloud Console → Morning Brief → Clients</div>
    </div>
    <div class="field">
      <label>Google Sheets Spreadsheet ID</label>
      <input id="f-sheets" type="text" placeholder="1BxiMVs0XRA5nFMdK..." value="${KEYS.sheets()||''}"/>
      <div class="field-hint">The long ID in your Sheets URL between /d/ and /edit</div>
    </div>
    <button class="btn btn-primary" onclick="saveSetup()" style="width:100%;margin-top:8px;padding:14px">Save and continue →</button>
  </div>`;
}

function saveSetup() {
  const g = document.getElementById("f-gemini").value.trim();
  const c = document.getElementById("f-clientid").value.trim();
  const s = document.getElementById("f-sheets").value.trim();
  if (!g || !c || !s) { alert("Please fill in all three fields."); return; }
  localStorage.setItem("mb_gemini_key", g);
  localStorage.setItem("mb_client_id", c);
  localStorage.setItem("mb_sheets_id", s);
  S.view="auth"; render();
}

function showSettings() {
  S.view="setup"; render();
}

function renderAuth() {
  return `
  <div class="auth-screen">
    <div class="logo" style="justify-content:center;margin-bottom:24px;font-size:22px"><span class="logo-dot"></span>morning brief</div>
    <div class="auth-title">Connect Gmail</div>
    <div class="auth-sub">Sign in with the Google account whose emails you want to read. Read-only access — nothing is modified.</div>
    <button class="auth-btn" onclick="signIn()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
    <div class="auth-note">Uses Gmail read-only + Google Sheets scope.<br/>Your keys never leave your browser.</div>
    <div style="margin-top:20px"><button class="btn btn-ghost" onclick="S.view='setup';render()" style="font-size:12px">← Change keys</button></div>
  </div>`;
}

function signIn() {
  const cid = KEYS.clientId();
  if (!cid) { S.view="setup"; render(); return; }
  const p = new URLSearchParams({
    client_id: cid,
    redirect_uri: window.location.origin + window.location.pathname,
    response_type: "token",
    scope: "https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/spreadsheets",
    prompt: "consent",
  });
  window.location.href = "https://accounts.google.com/o/oauth2/v2/auth?" + p;
}

function signOut() { clearToken(); S.view="auth"; render(); }

function renderHeader() {
  const today = new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long"});
  return `
  <div class="header">
    <div><div class="logo"><span class="logo-dot"></span>morning brief</div>
    <div class="header-meta">${today} &nbsp;·&nbsp; ${S.lastRun?"last run: "+S.lastRun:"never run"}</div></div>
    <div class="header-right">
      <button class="btn btn-ghost" onclick="signOut()">Sign out</button>
      <button class="btn btn-primary" onclick="runAgent()" ${S.running?"disabled":""}>
        ${S.running?'<span class="spin"></span>':"▶"} &nbsp;Run now
      </button>
    </div>
  </div>`;
}

function renderRun() {
  const steps=["Fetching emails — page 1","Paginating full inbox","Sending to Gemini","Classifying applications","Saving to Sheets","Done"];
  return `
  <div class="run-view">
    <div class="run-title">Agent running</div>
    <div class="run-sub">fetching → synthesising → saving…</div>
    <div class="step-list">
      ${steps.map((s,i)=>`
        <div class="step-item">
          <div class="step-num ${i<S.step?'done':i===S.step?'active':'pending'}">${i<S.step?'✓':i+1}</div>
          <span class="step-text ${i<S.step?'done':i===S.step?'active':'pending'}">${s}${i===S.step?'…':''}</span>
        </div>`).join("")}
    </div>
    ${S.error?`
    <div class="ebox">
      <div class="etitle">Error</div>
      <div class="etext">${S.error}</div>
      ${S.debugInfo?`<div class="edebug">Emails: ${S.debugInfo.emailCount||0} | ${S.debugInfo.preview||"(empty)"}</div>`:""}
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="S.error=null;S.view='dashboard';render()">Dismiss</button>
        <button class="btn btn-primary" onclick="S.error=null;runAgent()">Retry</button>
      </div>
    </div>`:""}
  </div>`;
}

function renderDashboard() {
  if (!S.standup) return `
  <div class="empty">
    <div class="empty-icon">☀️</div>
    <div class="empty-title">No standup yet</div>
    <div class="empty-sub">Hit Run now to fetch your emails and generate today's brief.</div>
    <button class="btn btn-primary" onclick="runAgent()">▶ &nbsp;Run first standup</button>
  </div>`;

  const active=S.pipeline.filter(a=>!["rejected","closed"].includes(a.status));
  const interviews=S.pipeline.filter(a=>a.status==="interview");
  const rejected=S.pipeline.filter(a=>a.status==="rejected");
  return `
  <div class="metrics">
    ${[["Active apps",active.length,"in pipeline","green"],["Interviews",interviews.length,"scheduled","blue"],["Rejections",rejected.length,"tracked","red"],["Total",S.pipeline.length,"all time","amber"]].map(([l,v,s,c])=>`
    <div class="metric ${c}"><div class="metric-label">${l}</div><div class="metric-val">${v}</div><div class="metric-sub">${s}</div></div>`).join("")}
  </div>
  ${S.alerts.length>0?`
  <div class="alert" style="margin-bottom:16px">
    <div class="alert-title">⚡ Urgent today</div>
    ${S.alerts.map(a=>`<div class="alert-item">${a}</div>`).join("")}
  </div>`:""}
  <div class="grid2">
    <div class="card">
      <div class="card-title"><span class="card-title-dot" style="background:var(--accent)"></span>Standup</div>
      ${[["Yesterday",S.standup.yesterday],["Blockers",S.standup.blockers],["Today",S.standup.today]].map(([l,t])=>`
      <div class="sb"><div class="sb-label">${l}</div><div class="sb-text">${t||"—"}</div></div>`).join("")}
    </div>
    <div class="card">
      <div class="card-title"><span class="card-title-dot" style="background:var(--red)"></span>Action items</div>
      ${S.actionItems.length>0?S.actionItems.map(a=>`
      <div class="ai">
        <div class="pdot" style="background:${a.priority==='high'?'var(--red)':a.priority==='medium'?'var(--amber)':'var(--text3)'}"></div>
        <div style="flex:1"><span class="plabel" style="color:${a.priority==='high'?'var(--red)':a.priority==='medium'?'var(--amber)':'var(--text3)'}">${a.priority}</span><span class="atext">${a.text}</span></div>
      </div>`).join(""):`<div style="font-size:13px;color:var(--text3)">No action items</div>`}
    </div>
  </div>
  <div class="card">
    <div class="card-title" style="justify-content:space-between">
      <span style="display:flex;align-items:center;gap:8px"><span class="card-title-dot" style="background:var(--blue)"></span>Application snapshot</span>
      <button class="btn btn-ghost" style="font-size:11px;padding:5px 10px" onclick="setView('pipeline')">View all →</button>
    </div>
    ${S.pipeline.length===0?`<div style="font-size:13px;color:var(--text3)">No applications yet.</div>`:`
    <table class="tbl"><thead><tr><th>Company</th><th>Role</th><th>Status</th><th>Updated</th></tr></thead><tbody>
    ${[...S.pipeline].reverse().slice(0,8).map(a=>`
    <tr><td style="font-family:var(--font);font-weight:600">${a.company}</td>
    <td style="color:var(--text2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.role}</td>
    <td><span class="badge badge-${a.status}">${a.status}</span></td>
    <td style="font-family:var(--mono);font-size:11px;color:var(--text3)">${a.lastUpdated}</td></tr>`).join("")}
    </tbody></table>`}
  </div>`;
}

function renderPipeline() {
  const sc={applied:"var(--blue)",reviewing:"var(--purple)",interview:"var(--teal)",offer:"var(--accent)",rejected:"var(--red)",closed:"var(--text3)",opportunity:"var(--amber)"};
  return `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div style="font-family:var(--font);font-size:18px;font-weight:800;letter-spacing:-0.5px">Pipeline</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${Object.keys(sc).map(s=>`<span class="badge badge-${s}">${s} (${S.pipeline.filter(a=>a.status===s).length})</span>`).join("")}
    </div>
  </div>
  ${S.pipeline.length===0?`<div class="card" style="text-align:center;padding:40px;color:var(--text3);font-size:13px">Pipeline empty. Run the agent to start tracking.</div>`:`
  <div style="display:flex;flex-direction:column;gap:8px">
    ${[...S.pipeline].reverse().map(a=>`
    <div class="pc">
      <div style="width:8px;height:8px;border-radius:50%;background:${sc[a.status]||'var(--text3)'};flex-shrink:0;margin-top:5px"></div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px">
          <span style="font-family:var(--font);font-size:15px;font-weight:700">${a.company}</span>
          <span class="badge badge-${a.status}">${a.status}</span>
        </div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.role}</div>
        ${a.note?`<div style="font-size:12px;color:var(--text3);margin-bottom:4px">${a.note}</div>`:""}
        ${a.history&&a.history.length>1?`<div style="display:flex;gap:8px;flex-wrap:wrap">${a.history.map(h=>`<span style="font-size:10px;color:var(--text3);font-family:var(--mono)">${h.date} <span style="color:${sc[h.status]||'var(--text3)'}">→ ${h.status}</span></span>`).join("")}</div>`:""}
      </div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0">${a.firstSeen}</div>
    </div>`).join("")}
  </div>
  <div style="text-align:center;margin-top:20px">
    <button class="btn btn-danger" onclick="if(confirm('Clear pipeline?')){S.pipeline=[];savePipeline([]);render()}">Clear pipeline</button>
  </div>`}`;
}

// ── Agent ──
async function runAgent() {
  if (!KEYS.token()) { S.view="auth"; render(); return; }
  S.running=true; S.view="run"; S.step=0; S.error=null; S.debugInfo=null; render();
  try {
    S.step=0; render();
    const p1 = await fetchEmails(null); await sleep(300);

    S.step=1; render();
    let threads=[...(p1.threads||[])];
    let nxt=p1.nextPageToken, pages=1;
    while(nxt&&pages<6){
      const nx=await fetchEmails(nxt);
      threads=[...threads,...(nx.threads||[])];
      nxt=nx.nextPageToken; pages++;
    }
    await sleep(300);

    S.step=2; render();
    const summary=threads.slice(0,60).map(t=>{
      const m=t.messages?.[0]||t;
      const subj=getHeader(m,"Subject"), from=getHeader(m,"From");
      return `FROM:${from}|SUBJ:${subj}|SNIP:${(m.snippet||"").replace(/\s+/g," ").slice(0,160)}`;
    }).join("\n");
    const gr=await callGemini(summary,threads.length);
    S.debugInfo={emailCount:threads.length,preview:gr?.slice(0,400)};
    await sleep(300);

    S.step=3; render();
    let parsed;
    try{
      const raw=gr.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
      const s=raw.indexOf("{"),e=raw.lastIndexOf("}");
      if(s===-1||e===-1) throw new Error("No JSON found");
      parsed=JSON.parse(raw.slice(s,e+1));
    }catch(er){ throw new Error("Parse failed: "+er.message+"\n"+gr?.slice(0,300)); }
    await sleep(300);

    S.step=4; render();
    const today=new Date().toISOString().split("T")[0];
    const stored=[...S.pipeline];
    for(const app of (parsed.applications||[])){
      const idx=stored.findIndex(x=>x.company.toLowerCase()===app.company.toLowerCase());
      if(idx>=0){
        if(stored[idx].status!==app.status){
          stored[idx]={...stored[idx],status:app.status,
            history:[...(stored[idx].history||[]),{date:today,status:app.status,note:app.note}],lastUpdated:today};
        }
      } else {
        stored.push({id:Date.now()+"-"+Math.random().toString(36).slice(2,6),
          company:app.company,role:app.role,status:app.status,note:app.note||"",
          firstSeen:today,lastUpdated:today,history:[{date:today,status:app.status,note:app.note}]});
      }
    }
    S.pipeline=stored; savePipeline(stored);
    await saveToSheets(stored);
    await sleep(300);

    S.step=5; render();
    const run={date:today,standup:parsed.standup,actionItems:parsed.actionItems||[],alerts:parsed.alerts||[],emailCount:threads.length};
    const runs=[...S.runs,run].slice(-30);
    S.runs=runs; saveRuns(runs);
    S.standup=parsed.standup; S.actionItems=parsed.actionItems||[]; S.alerts=parsed.alerts||[]; S.lastRun=today;
    await sleep(600); S.view="dashboard";
  } catch(e){ S.error=e.message||"Something went wrong."; }
  finally{ S.running=false; render(); }
}

async function fetchEmails(pageToken) {
  let url=`https://gmail.googleapis.com/gmail/v1/users/me/threads?maxResults=50&q=newer_than:1d+-in:draft`;
  if(pageToken) url+="&pageToken="+pageToken;
  const res=await fetch(url,{headers:{Authorization:"Bearer "+KEYS.token()}});
  const data=await res.json();
  if(data.error) throw new Error("Gmail: "+data.error.message);
  const threads=[];
  for(const t of (data.threads||[]).slice(0,20)){
    try{
      const d=await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/threads/${t.id}?format=metadata&metadataHeaders=Subject&metadataHeaders=From`,
        {headers:{Authorization:"Bearer "+KEYS.token()}});
      threads.push(await d.json());
    }catch(_){}
  }
  return {threads,nextPageToken:data.nextPageToken};
}

function getHeader(msg,name){
  const h=msg.messages?.[0]?.payload?.headers||msg.payload?.headers||[];
  return h.find(x=>x.name===name)?.value||"";
}

async function callGemini(emailData,count){
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${KEYS.gemini()}`;
  const prompt=`You are a standup and job application tracker for Akshdeep Singh (IIMA alumni, PM, job hunting). Today: ${new Date().toDateString()}.

Return ONLY a raw JSON object starting with { and ending with }. No markdown, no backticks, nothing else.

Schema: {"standup":{"yesterday":"string","blockers":"string","today":"string"},"applications":[{"company":"string","role":"string","status":"applied|reviewing|interview|offer|rejected|closed|opportunity","note":"string"}],"actionItems":[{"priority":"high|medium|low","text":"string"}],"alerts":["string"]}

Status: applied=confirmation, reviewing=under review, interview=scheduled, rejected=rejection, closed=position closed, opportunity=job alert worth reviewing.

${count} emails:
${emailData.slice(0,10000)}`;

  const res=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:2000,temperature:0.1}})});
  const data=await res.json();
  if(data.error) throw new Error("Gemini: "+data.error.message);
  return data.candidates?.[0]?.content?.parts?.[0]?.text||"{}";
}

async function saveToSheets(pipeline){
  const sid=KEYS.sheets();
  if(!sid) return;
  try{
    const values=[["Company","Role","Status","Note","First Seen","Last Updated"],
      ...pipeline.map(a=>[a.company,a.role,a.status,a.note||"",a.firstSeen,a.lastUpdated])];
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sid}/values/Sheet1!A1:F${values.length}?valueInputOption=RAW`,{
      method:"PUT",headers:{Authorization:"Bearer "+KEYS.token(),"Content-Type":"application/json"},
      body:JSON.stringify({values})});
  }catch(_){}
}

function setView(v){S.view=v;render();}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

init();
</script>
