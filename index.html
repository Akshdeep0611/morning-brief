<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Morning Brief — Akshdeep</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0D0D0D;
    --surface: #141414;
    --surface2: #1A1A1A;
    --border: #2A2A2A;
    --border2: #333;
    --text: #F0EDE8;
    --text2: #888;
    --text3: #555;
    --accent: #C8F135;
    --accent2: #A8D120;
    --red: #FF4D4D;
    --amber: #FFB547;
    --teal: #2DD4BF;
    --blue: #60A5FA;
    --purple: #A78BFA;
    --radius: 12px;
    --font: 'Syne', sans-serif;
    --mono: 'DM Mono', monospace;
    --body: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; }

  /* ── Layout ── */
  .app { max-width: 960px; margin: 0 auto; padding: 32px 20px; }

  /* ── Header ── */
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 40px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .header-left {}
  .logo { font-family: var(--font); font-size: 28px; font-weight: 800; letter-spacing: -1px; color: var(--text); display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); display: inline-block; animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .header-meta { font-size: 12px; color: var(--text3); margin-top: 6px; font-family: var(--mono); }
  .header-right { display: flex; gap: 8px; align-items: center; }

  /* ── Buttons ── */
  .btn { font-family: var(--font); font-size: 13px; font-weight: 600; padding: 10px 18px; border-radius: 8px; cursor: pointer; border: none; transition: all 0.15s; letter-spacing: 0.01em; }
  .btn-primary { background: var(--accent); color: #0D0D0D; }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
  .btn-ghost:hover { border-color: var(--text2); color: var(--text); }
  .btn-ghost.active { background: var(--surface2); color: var(--text); border-color: var(--text2); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid #FF4D4D44; font-size: 12px; padding: 7px 14px; }
  .btn-danger:hover { background: #FF4D4D11; }

  /* ── Nav ── */
  .nav { display: flex; gap: 6px; margin-bottom: 28px; }

  /* ── Metrics ── */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; position: relative; overflow: hidden; }
  .metric::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .metric.green::before { background: var(--accent); }
  .metric.red::before { background: var(--red); }
  .metric.amber::before { background: var(--amber); }
  .metric.blue::before { background: var(--blue); }
  .metric-label { font-size: 11px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .metric-val { font-family: var(--font); font-size: 32px; font-weight: 800; letter-spacing: -1px; color: var(--text); }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 4px; font-family: var(--mono); }

  /* ── Alert ── */
  .alert { background: #2A1F00; border: 1px solid #FFB54744; border-radius: var(--radius); padding: 14px 18px; margin-bottom: 16px; }
  .alert-title { font-size: 12px; font-weight: 600; color: var(--amber); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .alert-item { font-size: 13px; color: #FFD88A; padding: 4px 0; display: flex; gap: 8px; line-height: 1.5; }
  .alert-item::before { content: '→'; flex-shrink: 0; color: var(--amber); }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card-title { font-family: var(--font); font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .card-title-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* ── Grid ── */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }

  /* ── Standup blocks ── */
  .standup-block { margin-bottom: 16px; }
  .standup-block:last-child { margin-bottom: 0; }
  .standup-block-label { font-size: 10px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 5px; }
  .standup-block-text { font-size: 13px; color: var(--text); line-height: 1.7; }

  /* ── Action items ── */
  .action-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
  .action-item:last-child { border-bottom: none; }
  .priority-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .priority-label { font-size: 10px; font-family: var(--mono); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; margin-right: 4px; }
  .action-text { font-size: 13px; color: var(--text); line-height: 1.5; flex: 1; }

  /* ── Status badges ── */
  .badge { font-size: 10px; font-family: var(--mono); font-weight: 500; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
  .badge-applied { background: #1A2A3A; color: var(--blue); }
  .badge-reviewing { background: #221A3A; color: var(--purple); }
  .badge-interview { background: #0A2A22; color: var(--teal); }
  .badge-offer { background: #1A2A0A; color: var(--accent); }
  .badge-rejected { background: #2A0A0A; color: var(--red); }
  .badge-closed { background: #1A1A1A; color: var(--text3); }
  .badge-opportunity { background: #2A1A00; color: var(--amber); }

  /* ── Table ── */
  .tbl { width: 100%; border-collapse: collapse; }
  .tbl th { font-size: 10px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); padding: 0 12px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  .tbl td { padding: 11px 12px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tr:hover td { background: var(--surface2); }
  .tbl .company { font-family: var(--font); font-weight: 600; font-size: 13px; color: var(--text); }
  .tbl .role { color: var(--text2); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tbl .date { font-family: var(--mono); font-size: 11px; color: var(--text3); }

  /* ── Pipeline cards ── */
  .pipeline-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; display: flex; gap: 12px; align-items: flex-start; transition: border-color 0.15s; }
  .pipeline-card:hover { border-color: var(--border2); }
  .pipeline-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .pipeline-info { flex: 1; min-width: 0; }
  .pipeline-company { font-family: var(--font); font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .pipeline-role { font-size: 12px; color: var(--text2); margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pipeline-note { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
  .pipeline-history { display: flex; gap: 10px; flex-wrap: wrap; }
  .history-item { font-size: 10px; font-family: var(--mono); color: var(--text3); }
  .pipeline-date { font-family: var(--mono); font-size: 10px; color: var(--text3); flex-shrink: 0; }

  /* ── Run view ── */
  .run-view { max-width: 440px; margin: 60px auto; }
  .run-title { font-family: var(--font); font-size: 22px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
  .run-sub { font-size: 13px; color: var(--text3); margin-bottom: 28px; font-family: var(--mono); }
  .step-list { display: flex; flex-direction: column; gap: 10px; }
  .step-item { display: flex; align-items: center; gap: 12px; }
  .step-num { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; font-family: var(--mono); flex-shrink: 0; transition: all 0.3s; }
  .step-num.done { background: var(--accent); color: #0D0D0D; }
  .step-num.active { background: var(--purple); color: #fff; animation: pulse-ring 1.5s infinite; }
  .step-num.pending { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
  @keyframes pulse-ring { 0%,100%{box-shadow:0 0 0 0 #A78BFA44} 50%{box-shadow:0 0 0 6px #A78BFA00} }
  .step-text { font-size: 13px; transition: color 0.3s; }
  .step-text.done { color: var(--accent); }
  .step-text.active { color: var(--purple); font-weight: 500; }
  .step-text.pending { color: var(--text3); }

  /* ── Error ── */
  .error-box { background: #1A0000; border: 1px solid #FF4D4D44; border-radius: var(--radius); padding: 14px 18px; margin-top: 20px; }
  .error-title { font-size: 12px; font-weight: 600; color: var(--red); font-family: var(--mono); text-transform: uppercase; margin-bottom: 6px; }
  .error-text { font-size: 12px; color: #FF9999; line-height: 1.6; white-space: pre-wrap; word-break: break-word; margin-bottom: 10px; }
  .error-debug { background: #0D0D0D; border-radius: 6px; padding: 8px 10px; font-family: var(--mono); font-size: 10px; color: var(--text3); word-break: break-word; margin-bottom: 10px; max-height: 120px; overflow-y: auto; }
  .error-actions { display: flex; gap: 8px; }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 80px 20px; }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-title { font-family: var(--font); font-size: 20px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.5px; }
  .empty-sub { font-size: 13px; color: var(--text3); margin-bottom: 28px; line-height: 1.6; max-width: 320px; margin-left: auto; margin-right: auto; }

  /* ── Auth screen ── */
  .auth-screen { max-width: 400px; margin: 80px auto; text-align: center; }
  .auth-title { font-family: var(--font); font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
  .auth-sub { font-size: 14px; color: var(--text3); margin-bottom: 32px; line-height: 1.6; }
  .auth-btn { display: inline-flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 14px 24px; font-family: var(--font); font-size: 14px; font-weight: 600; color: var(--text); cursor: pointer; transition: all 0.15s; }
  .auth-btn:hover { border-color: var(--text2); background: var(--surface); transform: translateY(-1px); }
  .auth-note { font-size: 11px; color: var(--text3); margin-top: 16px; font-family: var(--mono); line-height: 1.6; }

  /* ── Section full ── */
  .section-full { margin-bottom: 12px; }

  /* ── Pipeline header ── */
  .pipeline-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .pipeline-filters { display: flex; gap: 6px; flex-wrap: wrap; }

  /* ── Spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; width: 12px; height: 12px; border: 2px solid #0D0D0D44; border-top-color: #0D0D0D; border-radius: 50%; animation: spin 0.7s linear infinite; }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Rendered by JS -->
</div>

<script>
// ── Config — REPLACE THESE WITH YOUR VALUES ──
const CONFIG = {
  GEMINI_API_KEY: "YOUR_GEMINI_API_KEY",
  GOOGLE_CLIENT_ID: "YOUR_GOOGLE_CLIENT_ID",
  SHEETS_ID: "YOUR_SHEETS_SPREADSHEET_ID",
  GMAIL_SCOPES: "https://www.googleapis.com/auth/gmail.readonly",
  SHEETS_SCOPES: "https://www.googleapis.com/auth/spreadsheets",
};

// ── Storage (localStorage for web app) ──
const PIPELINE_KEY = "mb_pipeline";
const RUNS_KEY = "mb_runs";
const TOKEN_KEY = "mb_token";

function savePipeline(data) { localStorage.setItem(PIPELINE_KEY, JSON.stringify(data)); }
function loadPipeline() { try { return JSON.parse(localStorage.getItem(PIPELINE_KEY)) || []; } catch { return []; } }
function saveRuns(data) { localStorage.setItem(RUNS_KEY, JSON.stringify(data)); }
function loadRuns() { try { return JSON.parse(localStorage.getItem(RUNS_KEY)) || []; } catch { return []; } }
function saveToken(t) { localStorage.setItem(TOKEN_KEY, JSON.stringify({ token: t, ts: Date.now() })); }
function loadToken() {
  try {
    const d = JSON.parse(localStorage.getItem(TOKEN_KEY));
    if (!d) return null;
    if (Date.now() - d.ts > 55 * 60 * 1000) { localStorage.removeItem(TOKEN_KEY); return null; }
    return d.token;
  } catch { return null; }
}

// ── State ──
let state = {
  view: "dashboard", // auth | dashboard | pipeline | run
  running: false,
  step: -1,
  error: null,
  debugInfo: null,
  standup: null,
  actionItems: [],
  alerts: [],
  pipeline: loadPipeline(),
  runs: loadRuns(),
  lastRun: null,
  accessToken: loadToken(),
};

// Restore last run
if (state.runs.length > 0) {
  const last = state.runs[state.runs.length - 1];
  state.standup = last.standup;
  state.actionItems = last.actionItems || [];
  state.alerts = last.alerts || [];
  state.lastRun = last.date;
}

// ── Render ──
function render() {
  const app = document.getElementById("app");
  if (!state.accessToken) { app.innerHTML = renderAuth(); return; }
  app.innerHTML = `
    ${renderHeader()}
    ${state.view === "run" ? renderRun() : `
      <div class="nav">
        <button class="btn btn-ghost ${state.view==='dashboard'?'active':''}" onclick="setView('dashboard')">Today</button>
        <button class="btn btn-ghost ${state.view==='pipeline'?'active':''}" onclick="setView('pipeline')">Pipeline (${state.pipeline.length})</button>
      </div>
      ${state.view === "dashboard" ? renderDashboard() : renderPipeline()}
    `}
  `;
}

function renderHeader() {
  const today = new Date().toLocaleDateString("en-IN", { weekday: "long", day: "numeric", month: "long" });
  return `
    <div class="header">
      <div class="header-left">
        <div class="logo"><span class="logo-dot"></span>morning brief</div>
        <div class="header-meta">${today} &nbsp;·&nbsp; ${state.lastRun ? "last run: " + state.lastRun : "never run"}</div>
      </div>
      <div class="header-right">
        <button class="btn btn-ghost" onclick="signOut()">Sign out</button>
        <button class="btn btn-primary" onclick="runAgent()" ${state.running ? "disabled" : ""}>
          ${state.running ? '<span class="spin"></span>' : "▶"} &nbsp;Run now
        </button>
      </div>
    </div>
  `;
}

function renderAuth() {
  return `
    <div class="auth-screen">
      <div class="logo" style="justify-content:center;margin-bottom:20px;font-size:24px"><span class="logo-dot"></span>morning brief</div>
      <div class="auth-title">Your daily<br/>AI standup</div>
      <div class="auth-sub">Reads your Gmail, synthesises what happened, tracks your job applications — all in one run.</div>
      <button class="auth-btn" onclick="signIn()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign in with Google
      </button>
      <div class="auth-note">Reads Gmail (read-only) and saves your pipeline<br/>to Google Sheets. Nothing is stored externally.</div>
    </div>
  `;
}

function renderRun() {
  const steps = [
    "Fetching emails — page 1",
    "Paginating full inbox",
    "Sending to Gemini for synthesis",
    "Classifying applications",
    "Saving to Google Sheets",
    "Rendering dashboard",
  ];
  return `
    <div class="run-view">
      <div class="run-title">Agent running</div>
      <div class="run-sub">Fetching → synthesising → saving pipeline…</div>
      <div class="step-list">
        ${steps.map((s, i) => `
          <div class="step-item">
            <div class="step-num ${i < state.step ? 'done' : i === state.step ? 'active' : 'pending'}">
              ${i < state.step ? '✓' : i + 1}
            </div>
            <span class="step-text ${i < state.step ? 'done' : i === state.step ? 'active' : 'pending'}">${s}${i === state.step ? '…' : ''}</span>
          </div>
        `).join("")}
      </div>
      ${state.error ? `
        <div class="error-box">
          <div class="error-title">Error</div>
          <div class="error-text">${state.error}</div>
          ${state.debugInfo ? `<div class="error-debug">Emails: ${state.debugInfo.emailCount || 0} | Response: ${state.debugInfo.preview || "(empty)"}</div>` : ""}
          <div class="error-actions">
            <button class="btn btn-ghost" onclick="state.error=null;state.view='dashboard';render()">Dismiss</button>
            <button class="btn btn-primary" onclick="state.error=null;runAgent()">Retry</button>
          </div>
        </div>
      ` : ""}
    </div>
  `;
}

function renderDashboard() {
  if (!state.standup) return `
    <div class="empty">
      <div class="empty-icon">☀️</div>
      <div class="empty-title">No standup yet</div>
      <div class="empty-sub">Hit Run now to fetch your emails and generate today's brief. Takes about 20 seconds.</div>
      <button class="btn btn-primary" onclick="runAgent()">▶ &nbsp;Run first standup</button>
    </div>
  `;

  const active = state.pipeline.filter(a => !["rejected","closed"].includes(a.status));
  const interviews = state.pipeline.filter(a => a.status === "interview");
  const rejected = state.pipeline.filter(a => a.status === "rejected");

  return `
    <div class="metrics">
      <div class="metric green">
        <div class="metric-label">Active apps</div>
        <div class="metric-val">${active.length}</div>
        <div class="metric-sub">in pipeline</div>
      </div>
      <div class="metric blue">
        <div class="metric-label">Interviews</div>
        <div class="metric-val">${interviews.length}</div>
        <div class="metric-sub">scheduled</div>
      </div>
      <div class="metric red">
        <div class="metric-label">Rejections</div>
        <div class="metric-val">${rejected.length}</div>
        <div class="metric-sub">tracked</div>
      </div>
      <div class="metric amber">
        <div class="metric-label">Total tracked</div>
        <div class="metric-val">${state.pipeline.length}</div>
        <div class="metric-sub">all time</div>
      </div>
    </div>

    ${state.alerts.length > 0 ? `
      <div class="alert section-full">
        <div class="alert-title">⚡ Urgent — action required today</div>
        ${state.alerts.map(a => `<div class="alert-item">${a}</div>`).join("")}
      </div>
    ` : ""}

    <div class="grid2">
      <div class="card">
        <div class="card-title"><span class="card-title-dot" style="background:var(--accent)"></span>Standup</div>
        <div class="standup-block">
          <div class="standup-block-label">Yesterday</div>
          <div class="standup-block-text">${state.standup.yesterday || "—"}</div>
        </div>
        <div class="standup-block">
          <div class="standup-block-label">Blockers</div>
          <div class="standup-block-text">${state.standup.blockers || "—"}</div>
        </div>
        <div class="standup-block">
          <div class="standup-block-label">Today</div>
          <div class="standup-block-text">${state.standup.today || "—"}</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title"><span class="card-title-dot" style="background:var(--red)"></span>Action items</div>
        ${state.actionItems.length > 0 ? state.actionItems.map(a => `
          <div class="action-item">
            <div class="priority-dot" style="background:${a.priority==='high'?'var(--red)':a.priority==='medium'?'var(--amber)':'var(--text3)'}"></div>
            <div style="flex:1">
              <span class="priority-label" style="color:${a.priority==='high'?'var(--red)':a.priority==='medium'?'var(--amber)':'var(--text3)'}">${a.priority}</span>
              <span class="action-text">${a.text}</span>
            </div>
          </div>
        `).join("") : `<div style="font-size:13px;color:var(--text3)">No action items today</div>`}
      </div>
    </div>

    <div class="card section-full">
      <div class="card-title" style="justify-content:space-between">
        <span style="display:flex;align-items:center;gap:8px"><span class="card-title-dot" style="background:var(--blue)"></span>Application snapshot</span>
        <button class="btn btn-ghost" style="font-size:11px;padding:5px 10px" onclick="setView('pipeline')">View all →</button>
      </div>
      ${state.pipeline.length === 0 ? `<div style="font-size:13px;color:var(--text3)">No applications yet. Run the agent to populate.</div>` : `
        <table class="tbl">
          <thead><tr><th>Company</th><th>Role</th><th>Status</th><th>Updated</th></tr></thead>
          <tbody>
            ${[...state.pipeline].reverse().slice(0,8).map(a => `
              <tr>
                <td class="company">${a.company}</td>
                <td class="role">${a.role}</td>
                <td><span class="badge badge-${a.status}">${a.status}</span></td>
                <td class="date">${a.lastUpdated}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `}
    </div>
  `;
}

function renderPipeline() {
  const statuses = ["applied","reviewing","interview","offer","rejected","closed","opportunity"];
  const statusColors = { applied:"var(--blue)", reviewing:"var(--purple)", interview:"var(--teal)", offer:"var(--accent)", rejected:"var(--red)", closed:"var(--text3)", opportunity:"var(--amber)" };

  return `
    <div class="pipeline-header">
      <div style="font-family:var(--font);font-size:18px;font-weight:800;letter-spacing:-0.5px">Pipeline</div>
      <div class="pipeline-filters">
        ${statuses.map(s => `
          <span class="badge badge-${s}">${s} (${state.pipeline.filter(a=>a.status===s).length})</span>
        `).join("")}
      </div>
    </div>

    ${state.pipeline.length === 0 ? `
      <div class="card" style="text-align:center;padding:40px">
        <div style="font-size:13px;color:var(--text3)">Pipeline empty. Run the agent to start tracking.</div>
      </div>
    ` : `
      <div style="display:flex;flex-direction:column;gap:8px">
        ${[...state.pipeline].reverse().map(a => `
          <div class="pipeline-card">
            <div class="pipeline-dot" style="background:${statusColors[a.status]||'var(--text3)'}"></div>
            <div class="pipeline-info">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
                <div class="pipeline-company">${a.company}</div>
                <span class="badge badge-${a.status}">${a.status}</span>
              </div>
              <div class="pipeline-role">${a.role}</div>
              ${a.note ? `<div class="pipeline-note">${a.note}</div>` : ""}
              ${a.history && a.history.length > 1 ? `
                <div class="pipeline-history">
                  ${a.history.map(h => `<span class="history-item">${h.date} → <span style="color:${statusColors[h.status]||'var(--text3)'}">${h.status}</span></span>`).join("")}
                </div>
              ` : ""}
            </div>
            <div class="pipeline-date">${a.firstSeen}</div>
          </div>
        `).join("")}
      </div>
      <div style="text-align:center;margin-top:20px">
        <button class="btn btn-danger" onclick="clearPipeline()">Clear pipeline</button>
      </div>
    `}
  `;
}

// ── Auth ──
function signIn() {
  const params = new URLSearchParams({
    client_id: CONFIG.GOOGLE_CLIENT_ID,
    redirect_uri: window.location.origin + window.location.pathname,
    response_type: "token",
    scope: CONFIG.GMAIL_SCOPES + " " + CONFIG.SHEETS_SCOPES,
    prompt: "consent",
  });
  window.location.href = "https://accounts.google.com/o/oauth2/v2/auth?" + params;
}

function signOut() {
  localStorage.removeItem(TOKEN_KEY);
  state.accessToken = null;
  state.view = "dashboard";
  render();
}

function handleOAuthCallback() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const token = params.get("access_token");
  if (token) {
    saveToken(token);
    state.accessToken = token;
    window.history.replaceState(null, "", window.location.pathname);
  }
}

// ── Agent ──
async function runAgent() {
  state.running = true; state.view = "run"; state.step = 0; state.error = null; state.debugInfo = null;
  render();

  try {
    // Step 1: Fetch emails page 1
    state.step = 0; render();
    const page1 = await fetchEmails(null);
    await sleep(300);

    // Step 2: Paginate
    state.step = 1; render();
    let threads = [...(page1.threads || [])];
    let nextToken = page1.nextPageToken;
    let pages = 1;
    while (nextToken && pages < 6) {
      const next = await fetchEmails(nextToken);
      const newT = next.threads || [];
      threads = [...threads, ...newT];
      nextToken = next.nextPageToken; pages++;
      if (newT.length > 0) {
        const oldest = new Date(newT[newT.length-1].internalDate || 0);
        if (Date.now() - oldest > 26 * 60 * 60 * 1000) break;
      }
    }
    await sleep(300);

    // Step 3: Gemini synthesis
    state.step = 2; render();
    const summary = threads.slice(0,60).map(t => {
      const m = t.messages?.[0] || t;
      const subj = getHeader(m, "Subject");
      const from = getHeader(m, "From");
      const snip = (m.snippet||"").replace(/\s+/g," ").slice(0,160);
      return `FROM:${from}|SUBJ:${subj}|SNIP:${snip}`;
    }).join("\n");

    const geminiRes = await callGemini(summary, threads.length);
    state.debugInfo = { emailCount: threads.length, preview: geminiRes?.slice(0,400) };
    await sleep(300);

    // Step 4: Parse
    state.step = 3; render();
    let parsed;
    try {
      const raw = geminiRes.replace(/```json\s*/gi,"").replace(/```\s*/g,"").trim();
      const s = raw.indexOf("{"); const e = raw.lastIndexOf("}");
      if (s === -1 || e === -1) throw new Error("No JSON found");
      parsed = JSON.parse(raw.slice(s, e+1));
    } catch(err) {
      throw new Error("Parse failed: " + err.message + "\nResponse: " + (geminiRes||"").slice(0,300));
    }
    await sleep(300);

    // Step 5: Update pipeline + save to Sheets
    state.step = 4; render();
    const today = new Date().toISOString().split("T")[0];
    const stored = [...state.pipeline];
    for (const app of (parsed.applications || [])) {
      const idx = stored.findIndex(s => s.company.toLowerCase() === app.company.toLowerCase());
      if (idx >= 0) {
        if (stored[idx].status !== app.status) {
          stored[idx] = { ...stored[idx], status: app.status,
            history: [...(stored[idx].history||[]), { date: today, status: app.status, note: app.note }],
            lastUpdated: today };
        }
      } else {
        stored.push({ id: Date.now()+"-"+Math.random().toString(36).slice(2,6),
          company: app.company, role: app.role, status: app.status, note: app.note,
          firstSeen: today, lastUpdated: today,
          history: [{ date: today, status: app.status, note: app.note }] });
      }
    }
    state.pipeline = stored; savePipeline(stored);
    await saveToSheets(stored);
    await sleep(300);

    // Step 6: Done
    state.step = 5; render();
    const newRun = { date: today, standup: parsed.standup, actionItems: parsed.actionItems||[], alerts: parsed.alerts||[], emailCount: threads.length };
    const runs = [...state.runs, newRun].slice(-30);
    state.runs = runs; saveRuns(runs);
    state.standup = parsed.standup;
    state.actionItems = parsed.actionItems || [];
    state.alerts = parsed.alerts || [];
    state.lastRun = today;
    await sleep(600);
    state.view = "dashboard";

  } catch(e) {
    state.error = e.message || "Something went wrong.";
  } finally {
    state.running = false; render();
  }
}

async function fetchEmails(pageToken) {
  let url = `https://gmail.googleapis.com/gmail/v1/users/me/threads?maxResults=50&q=newer_than:1d+-in:draft`;
  if (pageToken) url += "&pageToken=" + pageToken;
  const res = await fetch(url, { headers: { Authorization: "Bearer " + state.accessToken } });
  const data = await res.json();
  if (data.error) throw new Error("Gmail error: " + data.error.message);

  const threads = [];
  for (const t of (data.threads || []).slice(0, 20)) {
    try {
      const detail = await fetch(`https://gmail.googleapis.com/gmail/v1/users/me/threads/${t.id}?format=metadata&metadataHeaders=Subject&metadataHeaders=From`, {
        headers: { Authorization: "Bearer " + state.accessToken }
      });
      const td = await detail.json();
      threads.push(td);
    } catch (_) {}
  }
  return { threads, nextPageToken: data.nextPageToken };
}

function getHeader(msg, name) {
  const headers = msg.messages?.[0]?.payload?.headers || msg.payload?.headers || [];
  return headers.find(h => h.name === name)?.value || "";
}

async function callGemini(emailData, count) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${CONFIG.GEMINI_API_KEY}`;
  const today = new Date().toDateString();
  const prompt = `You are a standup and job application tracker for Akshdeep Singh (IIMA alumni, PM, job hunting). Today: ${today}.

Analyse these ${count} emails and return ONLY a raw JSON object — no markdown, no backticks, nothing before or after {}.

Schema:
{"standup":{"yesterday":"string","blockers":"string","today":"string"},"applications":[{"company":"string","role":"string","status":"applied|reviewing|interview|offer|rejected|closed|opportunity","note":"string"}],"actionItems":[{"priority":"high|medium|low","text":"string"}],"alerts":["string"]}

Status rules: applied=confirmation received, reviewing=under review, interview=scheduled, rejected=rejection, closed=position closed, opportunity=job alert worth reviewing.

Emails:
${emailData.slice(0, 10000)}`;

  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { maxOutputTokens: 2000, temperature: 0.1 } })
  });
  const data = await res.json();
  if (data.error) throw new Error("Gemini error: " + data.error.message);
  return data.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
}

async function saveToSheets(pipeline) {
  if (!CONFIG.SHEETS_ID || CONFIG.SHEETS_ID === "YOUR_SHEETS_SPREADSHEET_ID") return;
  try {
    const values = [["Company","Role","Status","Note","First Seen","Last Updated"]];
    for (const a of pipeline) values.push([a.company, a.role, a.status, a.note||"", a.firstSeen, a.lastUpdated]);
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEETS_ID}/values/Sheet1!A1:F${values.length}?valueInputOption=RAW`, {
      method: "PUT",
      headers: { Authorization: "Bearer " + state.accessToken, "Content-Type": "application/json" },
      body: JSON.stringify({ values })
    });
  } catch (_) {}
}

function clearPipeline() {
  if (!confirm("Clear all pipeline data?")) return;
  state.pipeline = []; savePipeline([]);
  render();
}

function setView(v) { state.view = v; render(); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Init ──
handleOAuthCallback();
render();
</script>
